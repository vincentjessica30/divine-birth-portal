<!--HERO--> 

<section class="contact-hero">
  <img src="images/edithHands.jpg" alt="edith and baby">

<main>

<section id="contact">
    <h2>Contact</h2>

    <p>
    If you are interested in working together or have questions about my services,
    please fill out the form below.
  </p>

  <form action="https://formspree.io/f/xreyezlg" method="POST">

    <input type="hidden" name="_subject" value="New Divine Birth Portal Inquiry">

    <label for="name">Name</label><br>
    <input type="text" id="name" name="name" required><br><br>

    <label for="due">Estimated Due Date</label><br>
    <input type="date" id="due" name="due"><br><br>

    <label for="birthplace">Where are you planning to give birth?</label><br>
    <input type="text" id="birthplace" name="birthplace"><br><br>

    <label for="location">Where do you live?</label><br>
    <input type="text" id="location" name="location"><br><br>

    <label for="payment">Self Pay or Insurance?</label><br>
    <select id="payment" name="payment">
      <option value="">Select one</option>
      <option value="self">Self Pay</option>
      <option value="insurance">Insurance</option>
    </select><br><br>

    <label for="insurance">If insurance, what provider?</label><br>
    <input type="text" id="insurance" name="insurance"><br><br>

    <label for="message">Anything else you'd like to share?</label><br>
    <textarea id="message" name="message" rows="4"></textarea><br><br>

    <button type="submit">Submit</button>

  </form>

    <p>All information is kept private and confidential.</p>

</section>
